name: Run Card News Factory

on:
  schedule:
    - cron: '30 20 * * *' # 매일 아침 5시 30분 자동 실행 영국시간기준이라 9시간 뺌 (필요에 따라 조절)
  workflow_dispatch: # 수동 실행 버튼 제공

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 최신 버전의 checkout 액션 사용 (v3 ➡️ v4)
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 최신 버전의 Python 설치 액션 사용 및 3.11 버전 지정 (v4 ➡️ v5)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. 라이브러리 설치
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. 파이썬 스크립트 실행 (환경 변수 주입)
    - name: Run Auto Factory
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      run: python auto_factory.py
