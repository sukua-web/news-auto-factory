name: Run Card News Factory

on:
  schedule:
    - cron: '28 17 * * *' # 매일 한국시간 기준 실행 (UTC 기준)
  workflow_dispatch: # 수동 실행 버튼 제공

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 최신 버전의 checkout 액션 사용
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 최신 버전의 Python 설치 액션 사용 및 3.11 버전 지정
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. 라이브러리 설치
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-genai pillow

    # 4. 파이썬 스크립트 실행 (환경 변수 주입)
    - name: Run Auto Factory
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
      run: python auto_factory.py

    # 5. 사용한 질문 히스토리(used_questions.json) 자동 커밋 & 푸시
    - name: Commit & Push updated used_questions.json
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add used_questions.json
        git commit -m "chore: update used_questions.json history [skip ci]" || echo "No changes to commit"
        git push
